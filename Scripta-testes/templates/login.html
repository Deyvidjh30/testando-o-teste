{% load static %}
<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}" />
  </head>
  <body>
    <main class="auth-card">
      <h1>Login</h1>
      <form method="post">
        {% csrf_token %}
        <label>Matrícula<input name="matricula" type="text" inputmode="numeric" pattern="[0-9]+" required /></label>
        <label>Senha<input name="senha" type="password" required /></label>
        {% if erro %}<small>{{ erro }}</small>{% endif %}
        <button type="submit">Entrar</button>
      </form>
      <a href="{% url 'cadastro' %}">Criar cadastro</a>
    </main>
  </body>
</html>
